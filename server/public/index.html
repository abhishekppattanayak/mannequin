<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mannequin API</title>
</head>
<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: monospace;
    }

    div {
      padding: 0 1rem;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1, p {
      width: 100%;
      text-align: center;
    }

    @media screen and (min-width: 240px) {
      div {
        font-size: 1.25rem;
      }
    }

    @media screen and (min-width: 540px) {
      div {
        font-size: 1.5rem;
      }
    }

    @media screen and (min-width: 740px) {
      div {
        font-size: 1.75rem;
      }
    }

  </style>
  <div>
    <h1>
      Welcome to Mannequin API 👋😯?!
    </h1>
    <p>
      This API only has authorized access and is not available for public use 🥲
    </p>
  </div>
</body>
</html>
